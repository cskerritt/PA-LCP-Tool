{% extends "base.html" %}
{% block title %}Edit item{% endblock %}
{% block content %}
<h1>Edit care item — {{ case.name }}</h1>
<form method="post" action="/cases/{{ case.id }}/items/{{ item.id }}" class="card">
  <div class="row">
    <div><label>Category</label><input name="category" value="{{ item.category }}"></div>
    <div style="flex:2 1 320px;"><label>Item *</label><input name="item" value="{{ item.item }}" required></div>
    <div><label>Growth key</label>
      <select name="growth_key">{% for k in growth_keys %}<option value="{{ k }}" {{ "selected" if item.growth_key == k }}>{{ k }}</option>{% endfor %}</select>
    </div>
  </div>
  <label>Description</label><input name="description" value="{{ item.description }}">
  <div class="row">
    <div><label>Code</label><input name="code" value="{{ item.code }}"></div>
    <div><label>Code type</label><input name="code_type" value="{{ item.code_type }}"></div>
    <div><label>Pricing source</label><input name="pricing_source" value="{{ item.pricing_source }}"></div>
    <div><label>Percentile</label><input name="percentile" value="{{ item.percentile if item.percentile is not none else '' }}"></div>
  </div>
  <div class="row">
    <div><label>Geographic basis</label><input name="geographic_basis" value="{{ item.geographic_basis }}"></div>
    <div><label>Retrieval date</label><input name="retrieval_date" value="{{ item.retrieval_date }}"></div>
    <div><label>Unit cost ($)</label><input name="unit_cost" value="{{ item.unit_cost }}"></div>
    <div><label>Units / occurrence</label><input name="units_per_occurrence" value="{{ item.units_per_occurrence }}"></div>
  </div>
  <div class="row">
    <div><label>Frequency / year</label><input name="frequency_per_year" value="{{ item.frequency_per_year if item.frequency_per_year is not none else '' }}"></div>
    <div><label>Every N years</label><input name="every_n_years" value="{{ item.every_n_years if item.every_n_years is not none else '' }}"></div>
    <div><label>One-time?</label><label class="small"><input type="checkbox" name="one_time" value="1" {{ "checked" if item.one_time }}> single event</label></div>
    <div><label>One-time age</label><input name="one_time_age" value="{{ item.one_time_age if item.one_time_age is not none else '' }}"></div>
  </div>
  <div class="row">
    <div><label>Start age</label><input name="start_age" value="{{ item.start_age if item.start_age is not none else '' }}"></div>
    <div><label>End age</label><input name="end_age" value="{{ item.end_age if item.end_age is not none else '' }}"></div>
  </div>
  <label>Medical foundation</label><input name="medical_foundation" value="{{ item.medical_foundation }}">
  <label>Notes</label><input name="notes" value="{{ item.notes }}">
  <div class="actions">
    <button class="btn" type="submit">Save item</button>
    <a class="btn secondary" href="/cases/{{ case.id }}">Cancel</a>
  </div>
</form>
{% endblock %}
